# email_app/views.py

from django.shortcuts import render, redirect
from django.core.mail import EmailMessage
from .forms import ContactForm
from django.conf import settings

def contact(request):
    if request.method == 'POST':
        form = ContactForm(request.POST)
        if form.is_valid():
            name = form.cleaned_data['name']
            email = form.cleaned_data['email']
            message = form.cleaned_data['message']
            
            # Création de l'email
            email_subject = f"Nouveau message de {name}"
            email_body = f"""
            <html>
                <body>
                    <h2>Message de {name}</h2>
                    <p><strong>Email:</strong> {email}</p>
                    <p><strong>Message:</strong></p>
                    <p>{message}</p>
                </body>
            </html>
            """
            
            # Envoi de l'email
            email = EmailMessage(
                subject=email_subject,
                body=email_body,
                from_email=settings.DEFAULT_FROM_EMAIL,
                to=[settings.EMAIL_HOST_USER],
                msg_id=None,
                headers={},
            )
            email.content_subtype = "html"  # Pour envoyer en HTML
            try:
                email.send()
                return redirect('success')  # Redirection vers une page de succès
            except Exception as e:
                return render(request, 'contact.html', {'form': form, 'error': str(e)})
        else:
            return render(request, 'contact.html', {'form': form})
    else:
        form = ContactForm()
        return render(request, 'contact.html', {'form': form})

def success(request):
    return render(request, 'success.html')