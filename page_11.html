<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>SMS App</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <nav>
    {% if current_user.is_authenticated %}
      <a href="{{ url_for('sms.dashboard') }}">Tableau</a>
      <a href="{{ url_for('sms.send_sms') }}">Envoyer</a>
      <a href="{{ url_for('auth.logout') }}">Déconnexion</a>
    {% endif %}
  </nav>
  <div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flashes">
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
